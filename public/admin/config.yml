backend:
  name: git-gateway
  branch: main
  publish_mode: editorial_workflow

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home Page"
        file: "src/content/home.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Subtitle", name: "subtitle", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - {label: "Button Text", name: "button_text", widget: "string"}
          - {label: "Button Link", name: "button_link", widget: "string"}
          - {label: "Hero Image", name: "hero_image", widget: "image"}
          - {label: "Body", name: "body", widget: "markdown"}

  - name: "about"
    label: "About"
    files:
      - name: "about"
        label: "About Page"
        file: "src/content/about.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Subtitle", name: "subtitle", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - {label: "About Image", name: "about_image", widget: "image"}
          - {label: "About Video", name: "about_video", widget: "video"}
          - {label: "Body", name: "body", widget: "markdown"}

  - name: "company"
    label: "Company Info"
    files:
      - name: "company"
        label: "Company Details"
        file: "src/content/company.md"
        fields:
          - {label: "Company Name", name: "companyName", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Phone", name: "phone", widget: "string"}
          - {label: "Address", name: "address", widget: "string"}
          - {label: "Business Hours", name: "businessHours", widget: "text"}

  - name: "products"
    label: "Products"
    folder: "src/content/products"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Image", name: "image", widget: "image"}
      - {label: "Category", name: "category", widget: "string"}
      - {label: "Specs", name: "specs", widget: "string"}
      - {label: "Price", name: "price", widget: "string"}
      - {label: "Video", name: "video", widget: "video"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "news"
    label: "News"
    folder: "src/content/news"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Excerpt", name: "excerpt", widget: "text"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Category", name: "category", widget: "string"}
      - {label: "Image", name: "image", widget: "image"}
      - {label: "Video", name: "video", widget: "video"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "settings"
    label: "Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "src/content/settings/general.md"
        fields:
          - {label: "Site Title", name: "siteTitle", widget: "string"}
          - {label: "Site Description", name: "siteDescription", widget: "text"}
          - {label: "Site Keywords", name: "siteKeywords", widget: "string"}
          - {label: "Contact Email", name: "contactEmail", widget: "string"}
          - {label: "Contact Phone", name: "contactPhone", widget: "string"}
          - {label: "Company Address", name: "companyAddress", widget: "string"}

      - name: "homepage"
        label: "Homepage Settings"
        file: "src/content/settings/homepage.md"
        fields:
          - {label: "Hero Title", name: "heroTitle", widget: "string"}
          - {label: "Hero Subtitle", name: "heroSubtitle", widget: "string"}
          - {label: "Hero Description", name: "heroDescription", widget: "text"}
          - {label: "CTA Text", name: "ctaText", widget: "string"}
          - {label: "CTA Link", name: "ctaLink", widget: "string"}

      - name: "about"
        label: "About Settings"
        file: "src/content/settings/about.md"
        fields:
          - {label: "About Description", name: "aboutDescription", widget: "text"}
          - {label: "Company History", name: "companyHistory", widget: "text"}
          - {label: "Company Values", name: "companyValues", widget: "text"}
          - {label: "Manufacturing Process", name: "manufacturingProcess", widget: "text"}

      - name: "products"
        label: "Products Settings"
        file: "src/content/settings/products.md"
        fields:
          - {label: "Products Title", name: "productsTitle", widget: "string"}
          - {label: "Products Description", name: "productsDescription", widget: "text"}
          - {label: "Category Description", name: "categoryDescription", widget: "text"}

      - name: "contact"
        label: "Contact Settings"
        file: "src/content/settings/contact.md"
        fields:
          - {label: "Contact Title", name: "contactTitle", widget: "string"}
          - {label: "Contact Description", name: "contactDescription", widget: "text"}
          - {label: "Form Title", name: "formTitle", widget: "string"}
          - {label: "Info Title", name: "infoTitle", widget: "string"}

      - name: "footer"
        label: "Footer Settings"
        file: "src/content/settings/footer.md"
        fields:
          - {label: "Company Info", name: "companyInfo", widget: "text"}
          - {label: "Quick Links Title", name: "quickLinksTitle", widget: "string"}
          - {label: "Contact Info Title", name: "contactInfoTitle", widget: "string"}
          - {label: "Copyright", name: "copyright", widget: "string"}

      - name: "media"
        label: "Media Settings"
        file: "src/content/settings/media.md"
        fields:
          - {label: "Media Title", name: "mediaTitle", widget: "string"}
          - {label: "Media Description", name: "mediaDescription", widget: "text"}

      - name: "technology"
        label: "Technology Settings"
        file: "src/content/settings/technology.md"
        fields:
          - {label: "Technology Title", name: "technologyTitle", widget: "string"}
          - {label: "Technology Description", name: "technologyDescription", widget: "text"}
