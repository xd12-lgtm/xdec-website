# Netlify CMS 配置文件
backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

publish_mode: editorial_workflow

collections:
  - name: "home"
    label: "主页内容"
    folder: "src/content"
    create: false
    fields:
      - {label: "标题", name: "title", widget: "string"}
      - {label: "副标题", name: "subtitle", widget: "string"}
      - {label: "描述", name: "description", widget: "text"}
      - {label: "按钮文本", name: "button_text", widget: "string"}
      - {label: "按钮链接", name: "button_link", widget: "string"}
      - {label: "主页图片", name: "hero_image", widget: "image"}
      - {label: "内容", name: "body", widget: "markdown"}

  - name: "about"
    label: "关于页面"
    folder: "src/content"
    create: false
    fields:
      - {label: "标题", name: "title", widget: "string"}
      - {label: "副标题", name: "subtitle", widget: "string"}
      - {label: "描述", name: "description", widget: "text"}
      - {label: "关于图片", name: "about_image", widget: "image"}
      - {label: "公司介绍视频", name: "about_video", widget: "video-selector"}
      - {label: "内容", name: "body", widget: "markdown"}

  - name: "company"
    label: "公司信息"
    folder: "src/content"
    create: false
    fields:
      - {label: "公司名称", name: "companyName", widget: "string"}
      - {label: "邮箱", name: "email", widget: "string"}
      - {label: "电话", name: "phone", widget: "string"}
      - {label: "地址", name: "address", widget: "string"}
      - {label: "营业时间", name: "businessHours", widget: "text"}

  - name: "products"
    label: "产品"
    folder: "src/content/products"
    create: true
    fields:
      - {label: "产品名称", name: "title", widget: "string"}
      - {label: "产品描述", name: "description", widget: "text"}
      - {label: "产品图片", name: "image", widget: "image"}
      - {label: "产品分类", name: "category", widget: "string"}
      - {label: "产品规格", name: "specs", widget: "string"}
      - {label: "产品价格", name: "price", widget: "string"}
      - {label: "产品视频", name: "video", widget: "video-selector"}
      - {label: "内容", name: "body", widget: "markdown"}

  - name: "news"
    label: "新闻"
    folder: "src/content/news"
    create: true
    fields:
      - {label: "新闻标题", name: "title", widget: "string"}
      - {label: "新闻摘要", name: "excerpt", widget: "text"}
      - {label: "发布日期", name: "date", widget: "datetime"}
      - {label: "新闻分类", name: "category", widget: "string"}
      - {label: "新闻图片", name: "image", widget: "image"}
      - {label: "新闻视频", name: "video", widget: "video-selector"}
      - {label: "内容", name: "body", widget: "markdown"}

  - name: "settings"
    label: "网站设置"
    files:
      - label: "常规设置"
        name: "general"
        file: "src/content/settings/general.md"
        fields:
          - {label: "网站标题", name: "siteTitle", widget: "string"}
          - {label: "网站描述", name: "siteDescription", widget: "text"}
          - {label: "网站关键词", name: "siteKeywords", widget: "string"}
          - {label: "联系邮箱", name: "contactEmail", widget: "string"}
          - {label: "联系电话", name: "contactPhone", widget: "string"}
          - {label: "公司地址", name: "companyAddress", widget: "string"}

      - label: "主页设置"
        name: "homepage"
        file: "src/content/settings/homepage.md"
        fields:
          - {label: "主页标题", name: "heroTitle", widget: "string"}
          - {label: "主页副标题", name: "heroSubtitle", widget: "string"}
          - {label: "主页描述", name: "heroDescription", widget: "text"}
          - {label: "按钮文本", name: "ctaText", widget: "string"}
          - {label: "按钮链接", name: "ctaLink", widget: "string"}

      - label: "关于页面设置"
        name: "about"
        file: "src/content/settings/about.md"
        fields:
          - {label: "关于描述", name: "aboutDescription", widget: "text"}
          - {label: "公司历史", name: "companyHistory", widget: "text"}
          - {label: "公司价值观", name: "companyValues", widget: "text"}
          - {label: "制造流程", name: "manufacturingProcess", widget: "text"}

      - label: "产品页面设置"
        name: "products"
        file: "src/content/settings/products.md"
        fields:
          - {label: "产品标题", name: "productsTitle", widget: "string"}
          - {label: "产品描述", name: "productsDescription", widget: "text"}
          - {label: "分类描述", name: "categoryDescription", widget: "text"}

      - label: "联系页面设置"
        name: "contact"
        file: "src/content/settings/contact.md"
        fields:
          - {label: "联系标题", name: "contactTitle", widget: "string"}
          - {label: "联系描述", name: "contactDescription", widget: "text"}
          - {label: "表单标题", name: "formTitle", widget: "string"}
          - {label: "信息标题", name: "infoTitle", widget: "string"}

      - label: "页脚设置"
        name: "footer"
        file: "src/content/settings/footer.md"
        fields:
          - {label: "公司信息", name: "companyInfo", widget: "text"}
          - {label: "快速链接标题", name: "quickLinksTitle", widget: "string"}
          - {label: "联系信息标题", name: "contactInfoTitle", widget: "string"}
          - {label: "版权信息", name: "copyright", widget: "string"}

      - label: "媒体中心设置"
        name: "media"
        file: "src/content/settings/media.md"
        fields:
          - {label: "媒体标题", name: "mediaTitle", widget: "string"}
          - {label: "媒体描述", name: "mediaDescription", widget: "text"}

      - label: "技术优势设置"
        name: "technology"
        file: "src/content/settings/technology.md"
        fields:
          - {label: "技术标题", name: "technologyTitle", widget: "string"}
          - {label: "技术描述", name: "technologyDescription", widget: "text"}
