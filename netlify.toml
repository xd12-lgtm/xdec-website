```toml
[build]
  publish = "build"
  command = "npm install --legacy-peer-deps && npm run build"

[build.environment]
  NODE_VERSION = "18"
  NPM_CONFIG_PRODUCTION = "false"
  # 确保安装 devDependencies
  YARN_PRODUCTION = "false"
  # 禁用缓存以避免构建问题
  DISABLE_CACHE = "true"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "development" }

[context.branch-deploy]
  environment = { NODE_ENV = "development" }

# 针对 main 分支的配置
[context.main]
  environment = { NODE_ENV = "production" }

# 添加构建钩子以确保正确的构建顺序
[build.processing]
  skip_processing = false

# 确保使用正确的 Node.js 版本
[functions]
  node_bundler = "esbuild"
```
